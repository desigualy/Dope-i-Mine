
name: dope_i_mine
description: Dope-i-Mine adaptive task support app
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  supabase_flutter: ^2.5.6
  speech_to_text: ^7.3.0
  flutter_tts: ^4.0.2
  shared_preferences: ^2.2.3
  flutter_local_notifications: ^17.2.1
  intl: ^0.20.2
  confetti: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/app_store/
    - assets/audio/focus/
    - assets/audio/rewards/
    - assets/audio/ui/
    - assets/branding/
    - assets/icons/
    - assets/illustrations/empty_states/
    - assets/illustrations/onboarding/
    - assets/localisation/pronunciation/
    - assets/localisation/copy/
    - assets/mascots/dope_i/expressions/
    - assets/mascots/dope_i/skins/classic/
    - assets/mascots/dope_i/skins/cozy/
    - assets/mascots/dope_i/skins/cyber/
    - assets/mascots/dope_i/skins/fantasy/
    - assets/mascots/dope_i/skins/seasonal/
    - assets/mascots/dope_i/skins/space/
    - assets/mascots/dope_i/voice_previews/
    - assets/mascots/alternates/fox/
    - assets/mascots/alternates/orb/
    - assets/mascots/alternates/owl/
    - assets/mascots/alternates/robot/
    - assets/play_store/
    - assets/user_avatar/accessories/
    - assets/user_avatar/base/
    - assets/user_avatar/palettes/
    - assets/avatar/dopei/
