
name: dope_i_mine
description: Dope-i-Mine adaptive task support app
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  supabase_flutter: ^2.5.6
  speech_to_text: ^7.3.0
  flutter_tts: ^4.0.2
  shared_preferences: ^2.2.3
  flutter_local_notifications: ^17.2.1
  intl: ^0.20.2
  confetti: ^0.7.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

